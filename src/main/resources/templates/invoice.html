<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="fr">

<head>
    <meta charset="UTF-8" content=""/>
    <title>Facture</title>

    <style>
        body { font-family: Arial, sans-serif; }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ddd;
            padding:8px;
        }

        th {
            background:#f2f2f2;
        }

        .total{
            text-align:right;
            font-weight:bold;
            margin-top:20px;
        }
    </style>

</head>

<body>

<h2>Facture #<span th:text="${invoice.number}"></span></h2>
<p>
    <strong>Statut: </strong><span th:text="${invoice.status}"></span>
</p>

<!-- Config injection -->
<div style="margin-bottom: 20px;">
    <h3 th:style="'color: ' + ${config.color}" th:text="${config.companyName}"></h3>
    <p th:if="${config.companyAddress != ''}" th:text="${config.companyAddress}"></p>
    <p th:if="${config.companyPhone != ''}" th:text="${config.companyPhone}"></p>
    <p th:if="${config.companyEmail != ''}" th:text="${config.companyEmail}"></p>
</div>

<p>Client : <span th:text="${invoice.clientName}"></span></p>
<p>Date : <span th:text="${invoice.date}"></span></p>

<table>

    <thead>
    <tr th:style="'background-color: ' + ${config.color} + '; color: #fff;'">
        <th>Article</th>
        <th>Prix</th>
        <th>Quantité</th>
        <th>Total</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="item : ${invoice.items}">
        <td th:text="${item.name}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.price * item.quantity}"></td>
    </tr>

    </tbody>

</table>

<p class="total" th:style="'color: ' + ${config.color}">
    Total Facture : <span th:text="${invoice.total}"></span>
</p>

<div th:if="${config.legalMentions != ''}" style="margin-top: 50px; font-size: 10px; color: #555; text-align: center;">
    <hr/>
    <p th:text="${config.legalMentions}"></p>
</div>

</body>
</html>
